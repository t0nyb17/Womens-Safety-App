name: womens_safety_app
description: A comprehensive women's safety application with emergency features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  url_launcher: ^6.1.14
  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  # Direct call & SMS without user dialog
  telephony: ^0.2.0
  flutter_phone_direct_caller: ^2.1.1

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
