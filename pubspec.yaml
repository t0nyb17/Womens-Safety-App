name: womens_safety_app
description: A comprehensive women's safety application with emergency features
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  url_launcher: ^6.1.14
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2

  # Direct call & SMS without user dialog
  telephony: ^0.2.0
  flutter_phone_direct_caller: ^2.1.1

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/images/
